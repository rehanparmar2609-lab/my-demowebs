<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Friends Coffee Bar</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Instrument+Serif&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#faf4eb;color:#0f0a05}

/* NAV */
nav{
position:fixed;top:0;width:100%;padding:15px 5%;
display:flex;justify-content:space-between;align-items:center;
background:rgba(250,244,235,0.9);
backdrop-filter:blur(10px);z-index:100;
}
.logo{font-weight:800;font-family:'Syne';}
.nav-links{display:flex;gap:20px}
.nav-links a{text-decoration:none;color:#000;font-size:14px}
.ham{display:none;cursor:pointer}

/* HERO */
#hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=1200&q=70') center/cover;
color:white;
}
.hero-content{
background:rgba(0,0,0,0.6);
padding:30px;border-radius:10px;
}
.hero-title{
font-size:40px;font-family:'Instrument Serif';
}
.btn{
margin-top:15px;
padding:12px 25px;
border-radius:30px;
background:#e8850a;color:white;
text-decoration:none;
display:inline-block;
}

/* SECTION */
section{padding:60px 5%}

/* MENU */
.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}
.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}
.card img{width:100%;height:180px;object-fit:cover}
.card-body{padding:15px}
.price{color:#e8850a;font-weight:bold}

/* CONTACT */
.contact{text-align:center}

/* WHATSAPP FLOAT */
.floating-wa{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:#fff;
font-size:24px;
width:55px;height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* MOBILE */
@media(max-width:768px){
.hero-title{font-size:28px}
.nav-links{display:none}
.ham{display:block}
}

</style>
</head>

<body>

<nav>
<div class="logo">Friends Coffee</div>
<div class="nav-links">
<a href="#menu">Menu</a>
<a href="#contact">Contact</a>
</div>
<div class="ham">☰</div>
</nav>

<section id="hero">
<div class="hero-content">
<h1 class="hero-title">Fresh Coffee, Cozy Vibes</h1>
<p>Trusted by 1000+ customers in Ahmedabad</p>
<a href="#menu" class="btn">View Menu</a>
</div>
</section>

<section id="menu">
<h2>Our Menu</h2>

<div class="menu-grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=500&q=70">
<div class="card-body">
<h3>Cold Coffee</h3>
<p class="price">₹80</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1585032226651-759b368d7246?w=500&q=70">
<div class="card-body">
<h3>Maggi</h3>
<p class="price">₹60</p>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1555949258-eb67b1ef0ceb?w=500&q=70">
<div class="card-body">
<h3>Pasta</h3>
<p class="price">₹100</p>
</div>
</div>

</div>
</section>

<section id="contact" class="contact">
<h2>Contact Us</h2>
<p>📍 Ahmedabad</p>
<p>📞 +91 91736 41342</p>
</section>

<a href="https://wa.me/919173641342" class="floating-wa">💬</a>

</body>
</html>
